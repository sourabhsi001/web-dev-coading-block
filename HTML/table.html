<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: serif; padding: 20px; }
        table { border: 2px solid #e0e0e0; font-size: 18px; }
        th, td { border: 1px solid #ccc; padding: 15px; width: 90px; }
    </style>
</head>
<body>

    <h2>Learning HTML TABLE</h2>

    <!-- cellspacing creates the distinctive box-gap look automatically -->
    <table cellspacing="12" align="left">
        <thead>
            <tr>
                <th>Day/time</th>
                <th>10-11</th>
                <th>11-12</th>
                <th>12-01</th>
                <th>01-02</th>
                <th>02-03</th>
            </tr>
        </thead>
        <tbody align="center">
            <tr>
                <td>Mon</td>
                <td>C++</td>
                <td>DSA</td>
                <td rowspan="7">BREAK</td>
                <td>JAVA</td>
                <td>Eng</td>
            </tr>
            <tr>
                <td>Tue</td>
                <td colspan="2">WEB</td>
                <td>SST</td>
                <td>SCI</td>
            </tr>
            <tr>
                <td>WED</td>
                <td>Python</td>
                <td>WEB</td>
                <td colspan="2">JAVA</td>
            </tr>
             <tr>
                <td>THU</td>
                <td>Python</td>
                <td>WEB</td>
                <td >JAVA</td>
                <td>c++</td>
            </tr>
             <tr>
                <td>FRI</td>
                <td >WEB</td>
                <td>JAVA</td>
                <td>SST</td>
                <td>SCI</td>
            </tr>
             
        </tbody>
    </table>

</body>
</html>
